<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Budget-Book</title>
        <link rel="stylesheet" href="Budget-Book.css">
    </head>

    <body>
        <header>
            <h1>💰 가계부 앱</h1>
        </header>

        <main>
            <div class="app">
                <section class="input-area">
                    <input class="amount-input" type="number" placeholder="금액 입력">

                    <select class="category-select">
                        <option value="food">식비</option>
                        <option value="traffic">교통</option>
                        <option value="shopping">쇼핑</option>
                        <option value="salary">급여</option>
                        <option value="etc">기타</option>
                    </select>
                    
                    <select class="type-select">
                        <option value="expense">지출</option>
                        <option value="income">수입</option>
                    </select>

                    <button class="add-btn">추가</button>
                </section>

                <section class="filter-area">
                    <select class="category-filter">
                        <option value="all">전체</option>
                        <option value="food">식비</option>
                        <option value="traffic">교통</option>
                        <option value="shopping">쇼핑</option>
                        <option value="salary">급여</option>
                        <option value="etc">기타</option>
                    </select>
                </section>

                <div class="budget-list">
                    <p class="empty-message">아직 등록된 거래가 없습니다.</p>
                </div>

                <section class="total-area">
                    <p class="income-total">총 수입 : 0원</p>
                    <p class="expense-total">총 지출 : 0원</p>
                    <p class="balance-total">잔액 : 0원</p>
                </section>
            </div>
        </main>

        <script src="Budget-Book.js"></script>
    </body>
</html>
