<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Budget-Book</title>
        <link rel="stylesheet" href="Budget-Book.css">
    </head>

    <body>
        <header>
            <h1>💰 가계부 앱</h1>
            
        </header>

        <main>
            <div class="app">
                <button class="theme-toggle-btn">🌙</button>
                <section class="input-area">입력: 
                    <input class="amount-input" type="number" inputmode="numeric" maxlength="9" step="1" min="1" placeholder="금액 입력">

                    <select class="type-select">
                        <option value="expense">지출</option>
                        <option value="income">수입</option>
                    </select>                    

                    <select class="category-select">
                        <option value="food">식비</option>
                        <option value="traffic">교통</option>
                        <option value="shopping">쇼핑</option>
                        <option value="salary">급여</option>
                        <option value="etc">기타</option>
                    </select>

                    <input class="description-input" autocomplete="off" maxlength="100" placeholder="메모">

                    <button class="add-btn">추가</button>
                    <button class="cancel-edit-btn">수정 취소</button>
                </section>

                <div class="control">
                    <section class="filter-area">필터: 
                        <select class="type-filter">
                            <option value="all">전체</option>
                            <option value="expense">지출</option>
                            <option value="income">수입</option>
                        </select>

                        <select class="category-filter">
                            <option value="all">전체</option>
                            <option value="food">식비</option>
                            <option value="traffic">교통</option>
                            <option value="shopping">쇼핑</option>
                            <option value="salary">급여</option>
                            <option value="etc">기타</option>
                        </select>

                        <select class="sort-select">
                            <option value="latest">최신순</option>
                            <option value="oldest">오래된순</option>
                            <option value="amount-desc">금액 큰 순</option>
                            <option value="amount-asc">금액 작은 순</option>
                        </select>

                        <select class="date-filter">
                            <option value="all">전체 기간</option>
                            <option value="today">오늘</option>
                            <option value="week">이번 주</option>
                            <option value="month">이번 달</option>
                        </select>

                        <input class="search-input" placeholder="메모 또는 금액 검색">
                    </section>

                    <section class="import-export">
                        <button class="export-btn">CSV 내보내기</button>
                        <button class="import-btn">CSV 불러오기</button>
                        <input type="file" class="import-input" accept=".csv" hidden>
                    </section>

                    <button class="delete-all-btn">전체 삭제</button>
                </div>

                <div class="toast-container">
                    <div class="toast"></div>
                </div>

                <div class="budget-list">
                    <p class="empty-message">아직 등록된 거래가 없습니다.</p>
                </div>

                <section class="total-area">
                    <p class="transaction-count"></p>
                    <p class="income-total">수입 : 0원</p>
                    <p class="expense-total">지출 : 0원</p>
                    <p class="balance-total">잔액 : 0원</p>
                </section>

                <section class="stats-area">
                    <h3>카테고리 통계</h3>
                    <div class="stats-list"></div>
                </section>
            </div>
        </main>

        <script src="Budget-Book.js"></script>
    </body>
    <!--
        step="1"    : 1 단위만 입력 가능(정수)
        min="1"     : 1 이상만 입력 가능

        <label for="amount">    : 사용자에게 해당 입력칸이 무엇을 입력하는 곳인지 알려주는 태그. input, textarea, select 등에 붙일 수 있다.
                                  <lebel for="amount">금액</label> <input id="amount" type="number"> 등의 형식.
                                  id가 amount인 요소와 연결한다는 의미로 for="amount"를 사용한다.
                                  이렇게 연결되면 label을 눌러도 input에 커서가 간다는 장점이 있다.
                                  브라우저, 스크린 리더도 해당 label을 읽어낼 수 있기 때문에 접근성도 좋아진다.
                                  현재 구조의 가독성을 해치지 않기 위해 해당 기능은 사용하고 있지 않다.
        autocomplete="off"      : 브라우저의 자동완성 기능을 끄는 속성.
                                  브라우저에 대한 요청으로, 브라우저의 정책이나 입력 종류에 따라 해당 기능이 실행되지 않을 수 있다.
        inputmode="numeric"     : 사용자가 입력하기 쉬운 키보드 형태를 브라우저에 알려주는 속성.
                                  해당 코드의 경우, '이 입력칸에 숫자를 입력할 가능성이 높으니 숫자 키패드를 보여달라'는 요청이다.
                                  '입력은 text지만 숫자 키패드를 보여달라'.
                                  전화번호와 같은 경우에서 type="number" inputmode="numeric"으로 사용하기도 한다.
    -->
</html>
