<!DOCTYPE html>
<html lang = "ko">
    <head>
        <meta charset="UTF-8">
        <title>Memo-App</title>
        <link rel = "stylesheet" href = "Memo-App.css">
    </head>

    <body>
        <header>
            <h1>메모 앱</h1>
        </header>

        <main>
            <div class="app">
                <h2>메모 리스트</h2>

                <section class="input-area">
                    <input class="title-input" placeholder="제목">
                    <textarea class="content-input" placeholder="내용"></textarea>
                    <button class="add-btn">추가</button><br>
                    <input class="search-input" placeholder="메모 검색">
                </section>

                <div class="note-list"></div>
            </div>
        </main>

        <script src="Memo-App.js"></script>
    </body>
</html>
