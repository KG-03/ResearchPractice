<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>ToDo-List</title>
        <link rel = "stylesheet" href = "ToDo-List.css">
    </head>
    
    <body>
        <header>
            <h1>투두 리스트</h1>
        </header>

        <main>
            <h2>할 일 목록</h2>
            <input class = "input" type = "text" placeholder= "검색 또는 할 일을 입력하세요" />
            <button class = "btn">입력</button>
            <button class = "delall">전체 삭제</button>
            <p class = "filter">필터: 
                <button id = "filter-all" class = "filter">전체</button>
                <button id = "filter-done" class = "filter">완료</button>
                <button id = "filter-notDone" class = "filter">미완료</button> </p>
            <p class = "guide"></p>
            <ul class = "list"></ul>
        </main>

        <script src = "ToDo-List.js"></script>
    </body>
</html>
